<svg viewBox="0 0 480 160" xmlns="http://www.w3.org/2000/svg">

  <!-- Transparent background (no rect fill) -->

  <!-- House/home icon with umbrella feel — insurance symbol -->
  <!-- Outer circle -->
  <circle cx="80" cy="80" r="62" fill="#00a98f"/>
  <!-- Inner white circle -->
  <circle cx="80" cy="80" r="52" fill="white"/>

  <!-- Letter B styled icon inside circle -->
  <text x="80" y="100" font-family="'Georgia', serif" font-size="72" font-weight="900" fill="#00a98f" text-anchor="middle">B</text>

  <!-- Small dot accent -->
  <circle cx="80" cy="148" r="5" fill="#00a98f"/>

  <!-- BRISTOL text -->
  <text x="165" y="72" font-family="'Trebuchet MS', Arial, sans-serif" font-size="46" font-weight="900" fill="#00a98f" letter-spacing="3">BRISTOL</text>

  <!-- Thin divider line -->
  <rect x="165" y="82" width="295" height="3" fill="#00a98f" rx="2"/>

  <!-- WEST text -->
  <text x="165" y="128" font-family="'Trebuchet MS', Arial, sans-serif" font-size="46" font-weight="900" fill="#222" letter-spacing="12">WEST</text>

  <!-- Tagline -->
  <text x="167" y="150" font-family="Arial, sans-serif" font-size="11" fill="#00a98f" letter-spacing="5">INSURANCE COMPANY</text>

</svg>
